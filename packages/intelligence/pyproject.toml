[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "tradingos-intelligence"
version = "0.1.0"
description = "TradingOS Intelligence Layer — provider-agnostic agent implementations"
requires-python = ">=3.11"

dependencies = [
    # HTTP clients
    "httpx>=0.27.0",
    "aiohttp>=3.9.0",
    "websockets>=12.0",

    # Data
    "pydantic>=2.7.0",
    "pandas>=2.2.0",
    "numpy>=1.26.0",

    # Vector store
    "qdrant-client>=1.9.0",

    # Market data
    "pycoingecko>=3.1.0",

    # Database
    "asyncpg>=0.29.0",
    "redis[asyncio]>=5.0.0",

    # Web framework (for health endpoint)
    "fastapi>=0.111.0",
    "uvicorn[standard]>=0.30.0",

    # Scheduling
    "apscheduler>=3.10.0",

    # Observability
    "opentelemetry-api>=1.24.0",
    "opentelemetry-sdk>=1.24.0",
    "opentelemetry-exporter-otlp-proto-grpc>=1.24.0",

    # Utils
    "structlog>=24.0.0",
    "python-dotenv>=1.0.0",
    "tenacity>=8.3.0",
]

[project.optional-dependencies]
# LLM provider SDKs — install whichever you use
anthropic = ["anthropic>=0.30.0"]
openai   = ["openai>=1.30.0"]
google   = ["google-generativeai>=0.7.0"]
groq     = ["openai>=1.30.0"]       # Groq uses the OpenAI-compat SDK
together = ["openai>=1.30.0"]
fireworks = ["openai>=1.30.0"]

# Convenience bundles
all-providers = [
    "anthropic>=0.30.0",
    "openai>=1.30.0",
    "google-generativeai>=0.7.0",
]

dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "ruff>=0.4.0",
    "mypy>=1.10.0",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.mypy]
python_version = "3.11"
strict = true
