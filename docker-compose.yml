version: "3.9"

# TradingOS — Full Stack Agent-Native Trading Intelligence Platform

x-common: &common
  restart: unless-stopped
  env_file: .env
  networks:
    - tradingos

services:
  # ─────────────────────────────────────────
  # INFRASTRUCTURE
  # ─────────────────────────────────────────

  postgres:
    <<: *common
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_USER: tradingos
      POSTGRES_PASSWORD: tradingos
      POSTGRES_DB: tradingos
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tradingos"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    <<: *common
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    <<: *common
    image: qdrant/qdrant:v1.9.0
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # CORE — SIGNAL BUS (RUST)
  # ─────────────────────────────────────────

  signal-bus:
    <<: *common
    build:
      context: ./packages/signal-bus
      dockerfile: Dockerfile
    ports:
      - "${SIGNAL_BUS_PORT:-7700}:7700"
    volumes:
      - ./plugins/strategies:/app/plugins:ro
    environment:
      RUST_LOG: info
      PLUGIN_DIR: /app/plugins
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:7700/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # AGENT RUNTIME (ELIXIR OTP)
  # ─────────────────────────────────────────

  agent-runtime:
    <<: *common
    build:
      context: ./packages/agent-runtime
      dockerfile: Dockerfile
    ports:
      - "${AGENT_RUNTIME_PORT:-7701}:7701"
      - "4369:4369"   # Erlang distribution
    environment:
      MIX_ENV: prod
      RELEASE_NODE: trading_os@agent-runtime
      RELEASE_COOKIE: tradingos_secret_cookie
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      signal-bus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:7701/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─────────────────────────────────────────
  # INTELLIGENCE LAYER (PYTHON + CLAUDE)
  # ─────────────────────────────────────────

  intelligence:
    <<: *common
    build:
      context: ./packages/intelligence
      dockerfile: Dockerfile
    ports:
      - "7703:7703"
    environment:
      PYTHONUNBUFFERED: "1"
      SIGNAL_BUS_URL: http://signal-bus:7700
      AGENT_RUNTIME_URL: http://agent-runtime:7701
      QDRANT_URL: http://qdrant:6333
    depends_on:
      signal-bus:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:7703/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─────────────────────────────────────────
  # API GATEWAY (GO)
  # ─────────────────────────────────────────

  api-gateway:
    <<: *common
    build:
      context: ./packages/api-gateway
      dockerfile: Dockerfile
    ports:
      - "${API_GATEWAY_PORT:-8080}:8080"
    environment:
      SIGNAL_BUS_URL: http://signal-bus:7700
      AGENT_RUNTIME_URL: http://agent-runtime:7701
      INTELLIGENCE_URL: http://intelligence:7703
      QUANT_ENGINE_URL: http://quant-engine:7702
    depends_on:
      signal-bus:
        condition: service_healthy
      agent-runtime:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # MCP SERVER (TYPESCRIPT)
  # ─────────────────────────────────────────

  mcp-server:
    <<: *common
    build:
      context: ./packages/mcp-server
      dockerfile: Dockerfile
    ports:
      - "${MCP_SERVER_PORT:-4000}:4000"
    environment:
      API_GATEWAY_URL: http://api-gateway:8080
      NODE_ENV: production
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # DASHBOARD (NEXT.JS 15)
  # ─────────────────────────────────────────

  dashboard:
    <<: *common
    build:
      context: ./packages/dashboard
      dockerfile: Dockerfile
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
      NEXT_PUBLIC_WS_URL: ws://localhost:8080
      NEXT_PUBLIC_MCP_URL: http://localhost:4000
      NODE_ENV: production
    depends_on:
      api-gateway:
        condition: service_healthy

  # ─────────────────────────────────────────
  # QUANT ENGINE (JULIA)
  # ─────────────────────────────────────────

  quant-engine:
    <<: *common
    build:
      context: ./packages/quant-engine
      dockerfile: Dockerfile
    ports:
      - "${QUANT_ENGINE_PORT:-7702}:7702"
    volumes:
      - quant_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:7702/health || exit 1"]
      interval: 20s
      timeout: 15s
      retries: 5

  # ─────────────────────────────────────────
  # OBSERVABILITY
  # ─────────────────────────────────────────

  otel-collector:
    <<: *common
    image: otel/opentelemetry-collector-contrib:0.99.0
    volumes:
      - ./config/otel/config.yaml:/etc/otelcol-contrib/config.yaml
    ports:
      - "4317:4317"   # gRPC
      - "4318:4318"   # HTTP

  prometheus:
    <<: *common
    image: prom/prometheus:v2.51.0
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"

  grafana:
    <<: *common
    image: grafana/grafana:10.4.0
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/dashboards:/etc/grafana/provisioning/dashboards
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: tradingos

networks:
  tradingos:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  quant_data:
  prometheus_data:
  grafana_data:
